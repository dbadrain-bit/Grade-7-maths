<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grade 7 Ontario Math Practice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .error {
            color: #f44336;
            font-size: 0.9em;
            margin-top: 5px;
            display: none;
        }

        .error.show {
            display: block;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }

        .toggle-form button {
            background: none;
            color: #667eea;
            padding: 0;
            margin: 0;
            text-decoration: underline;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            margin-left: 5px;
        }

        .toggle-form button:hover {
            transform: none;
            box-shadow: none;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading.show {
            display: block;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Math Practice</h1>
            <p>Grade 7 Ontario Curriculum</p>
        </div>

        <div class="content">
            <!-- Login Form -->
            <form id="loginForm" class="form active">
                <h2 style="margin-bottom: 30px; color: #333;">Login</h2>
                
                <div class="success" id="loginSuccess">
                    Successfully logged in! Redirecting...
                </div>

                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" required>
                    <div class="error"></div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                    <div class="error"></div>
                </div>

                <div class="loading" id="loginLoading">
                    <div class="spinner"></div>
                </div>

                <button type="submit">Login</button>

                <div class="toggle-form">
                    Don't have an account?
                    <button type="button" id="toggleToRegister">Sign Up</button>
                </div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="form">
                <h2 style="margin-bottom: 30px; color: #333;">Create Account</h2>

                <div class="success" id="registerSuccess">
                    Account created successfully! Logging in...
                </div>

                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" required>
                    <div class="error"></div>
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email (optional)</label>
                    <input type="email" id="registerEmail">
                    <div class="error"></div>
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" required>
                    <div class="error"></div>
                </div>

                <div class="loading" id="registerLoading">
                    <div class="spinner"></div>
                </div>

                <button type="submit">Sign Up</button>

                <div class="toggle-form">
                    Already have an account?
                    <button type="button" id="toggleToLogin">Login</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const toggleToRegister = document.getElementById('toggleToRegister');
        const toggleToLogin = document.getElementById('toggleToLogin');

        // Toggle between forms
        toggleToRegister.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.remove('active');
            registerForm.classList.add('active');
        });

        toggleToLogin.addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.classList.remove('active');
            loginForm.classList.add('active');
        });

        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const loading = document.getElementById('loginLoading');
            const success = document.getElementById('loginSuccess');

            loading.classList.add('show');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                // Save token
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                success.classList.add('show');

                // Redirect based on user role
                setTimeout(() => {
                    if (data.user.isAdmin) {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/app';
                    }
                }, 1000);
            } catch (error) {
                const errorDiv = loginForm.querySelector('.error');
                errorDiv.textContent = error.message;
                errorDiv.classList.add('show');
            } finally {
                loading.classList.remove('show');
            }
        });

        // Register
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const loading = document.getElementById('registerLoading');
            const success = document.getElementById('registerSuccess');

            loading.classList.add('show');

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email: email || null })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Registration failed');
                }

                success.classList.add('show');

                // Auto-login after registration
                setTimeout(() => {
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').value = password;
                    loginForm.dispatchEvent(new Event('submit'));
                }, 1000);
            } catch (error) {
                const errorDiv = registerForm.querySelector('.error');
                errorDiv.textContent = error.message;
                errorDiv.classList.add('show');
            } finally {
                loading.classList.remove('show');
            }
        });

        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/app';
        }
    </script>
</body>
</html>
